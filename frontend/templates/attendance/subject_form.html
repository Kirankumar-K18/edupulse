{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}

<div class="section-card">

```
<div class="section-card-header">
    <h6 class="section-card-title">
        <i class="bi bi-book text-primary-custom"></i>
        {{ title }}
    </h6>
</div>

<form method="post">
    {% csrf_token %}

    <div class="row g-3">

        {% for field in form %}
        <div class="col-md-6">
            <label class="form-label">
                {{ field.label }}
            </label>

            {{ field }}

            {% if field.errors %}
            <div class="text-danger small">
                {{ field.errors }}
            </div>
            {% endif %}
        </div>
        {% endfor %}

    </div>

    <div class="mt-4">

        <button type="submit"
                class="btn btn-primary">
            Save Subject
        </button>

        <a href="{% url 'attendance:subjects' %}"
           class="btn btn-secondary">
            Cancel
        </a>

    </div>

</form>
```

</div>

{% endblock %}
