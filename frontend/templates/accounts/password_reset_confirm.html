{% extends 'base.html' %}

{% block title %}Reset Password{% endblock %}

{% block auth_content %}
<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width:500px;">

        <h3>Set New Password</h3>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                    class="btn btn-success w-100">
                Change Password
            </button>
        </form>

    </div>
</div>
{% endblock %}
